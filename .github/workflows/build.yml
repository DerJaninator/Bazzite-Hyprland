name: Build Hyprland Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Image
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          registry: ghcr.io
          registry_namespace: DerJaninator
          push: true
          build_opts: "--no-sign"


